name: Daily Metrics Pipeline

on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run simulation + report
        run: |
          python scripts/run_daily_pipeline.py

      - name: Commit updated daily report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/daily_metrics.md reports/funnel.png reports/cohort_heatmap.png || true
          git diff --staged --quiet || git commit -m "chore: update daily metrics report"
          git push

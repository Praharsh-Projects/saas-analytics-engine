saas_analytics_engine:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'localhost') }}"
      port: "{{ env_var('DBT_PORT', '5432') | as_number }}"
      user: "{{ env_var('DBT_USER', 'analytics') }}"
      pass: "{{ env_var('DBT_PASSWORD', 'analytics') }}"
      dbname: "{{ env_var('DBT_DBNAME', 'analytics') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'public') }}"
      threads: 4
